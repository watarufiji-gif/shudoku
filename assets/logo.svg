<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <g stroke="#C9A962" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
    <!-- 外側の六角形 (頂点上) -->
    <polygon points="100,18 171,59 171,141 100,182 29,141 29,59"/>

    <!-- 中央の背骨ライン -->
    <line x1="100" y1="18" x2="100" y2="150"/>

    <!-- 左ページ：外側の斜め線と縦線 -->
    <line x1="100" y1="150" x2="60" y2="126"/>
    <line x1="60" y1="126" x2="60" y2="60"/>

    <!-- 左ページ：内側の斜め線と縦線 -->
    <line x1="100" y1="150" x2="70" y2="126"/>
    <line x1="70" y1="126" x2="70" y2="110"/>

    <!-- 左の横バー（柱の横断線） -->
    <line x1="60" y1="110" x2="70" y2="110"/>

    <!-- 左ページ上部 → 六角形の頂点へ -->
    <line x1="60" y1="60" x2="100" y2="18"/>
    <line x1="60" y1="60" x2="29" y2="59"/>

    <!-- 左ページ下部 → 六角形の左下頂点へ -->
    <line x1="60" y1="126" x2="29" y2="141"/>

    <!-- 右ページ：外側の斜め線と縦線 -->
    <line x1="100" y1="150" x2="140" y2="126"/>
    <line x1="140" y1="126" x2="140" y2="60"/>

    <!-- 右ページ：内側の斜め線と縦線 -->
    <line x1="100" y1="150" x2="130" y2="126"/>
    <line x1="130" y1="126" x2="130" y2="110"/>

    <!-- 右の横バー -->
    <line x1="140" y1="110" x2="130" y2="110"/>

    <!-- 右ページ上部 → 六角形の頂点へ -->
    <line x1="140" y1="60" x2="100" y2="18"/>
    <line x1="140" y1="60" x2="171" y2="59"/>

    <!-- 右ページ下部 → 六角形の右下頂点へ -->
    <line x1="140" y1="126" x2="171" y2="141"/>

    <!-- 下部ダイヤモンド -->
    <line x1="100" y1="150" x2="75" y2="161"/>
    <line x1="75"  y1="161" x2="100" y2="182"/>
    <line x1="100" y1="150" x2="125" y2="161"/>
    <line x1="125" y1="161" x2="100" y2="182"/>
  </g>
</svg>
